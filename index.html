<title>NLC Inventory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;}

#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:14px;}
.login-logo{width:90px;height:90px;border-radius:20px;object-fit:cover;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.login-title{font-size:22px;font-weight:800;color:#8e3014;}
.login-sub{color:#888;font-size:13px;}
.store-btn{width:100%;max-width:360px;padding:18px;font-size:17px;font-weight:700;border:none;border-radius:14px;cursor:pointer;color:white;background:#8e3014;transition:transform .1s;}
.store-btn:active{transform:scale(.97);}
.store-btn.cc{background:#1565c0;}
.store-btn.mgr{background:#2e7d32;}
.store-btn.settings-btn{background:#555;font-size:14px;padding:13px;}
.login-divider{width:100%;max-width:360px;border:none;border-top:1px solid #e0e0e0;margin:4px 0;}

.pin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;}
.pin-overlay.active{display:flex;}
.pin-box{background:white;border-radius:22px;padding:28px 24px;width:300px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.3);}
.pin-logo{width:48px;height:48px;border-radius:10px;margin:0 auto 12px;display:block;}
.pin-box h3{font-size:17px;font-weight:700;margin-bottom:4px;color:#222;}
.pin-box p{font-size:13px;color:#888;margin-bottom:18px;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#e0e0e0;transition:background .15s;}
.pin-dot.filled{background:#8e3014;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-key{padding:16px;font-size:20px;font-weight:700;border:none;border-radius:12px;background:#f5f5f5;cursor:pointer;transition:background .1s;}
.pin-key:active{background:#e0e0e0;}
.pin-key.del{background:#ffcdd2;color:#c62828;}
.pin-error{color:#c62828;font-size:12px;font-weight:600;margin-top:10px;min-height:16px;}
.pin-cancel{margin-top:12px;background:none;border:none;color:#888;font-size:13px;cursor:pointer;}

#app-screen{display:none;min-height:100vh;}
.top-bar{position:sticky;top:0;z-index:200;background:#8e3014;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.top-bar-left{display:flex;align-items:center;gap:10px;}
.top-bar-logo{width:34px;height:34px;border-radius:8px;object-fit:cover;}
.top-bar h2{font-size:17px;font-weight:700;}
.top-bar .sub{font-size:11px;opacity:.8;margin-top:1px;}
.top-right{display:flex;align-items:center;gap:8px;}
#live-dot{font-size:11px;opacity:.9;}
#back-btn{background:rgba(255,255,255,.2);border:none;color:white;font-size:13px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:8px;}

#weekend-banner{background:#e65100;color:white;text-align:center;padding:8px 16px;font-size:13px;font-weight:700;display:none;}
#pm-reminder{background:#b71c1c;color:white;text-align:center;padding:10px 16px;font-size:14px;font-weight:700;display:none;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}

.item-divider{height:6px;background:#e0e0e0;margin:4px 0;}
.item-card{background:white;margin:4px 8px;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;}
.item-main{display:flex;align-items:center;gap:11px;padding:11px 12px;}
.item-img{width:60px;height:60px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.item-placeholder{width:60px;height:60px;border-radius:10px;flex-shrink:0;background:#f0f0f0;border:1.5px dashed #ddd;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:700;color:#1a1a1a;line-height:1.3;}
.item-par{font-size:11px;color:#888;margin-top:3px;}
.flags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.flag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;}
.flag-half{background:#fff3e0;color:#e65100;}
.flag-check{background:#fce4ec;color:#c62828;}
.counter{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.counter button{width:36px;height:36px;border-radius:50%;border:none;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-minus{background:#ffcdd2;color:#b71c1c;}
.btn-plus{background:#c8e6c9;color:#1b5e20;}
.counter .val{font-size:21px;font-weight:800;min-width:30px;text-align:center;color:#1a1a1a;}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dot-ok{background:#43a047;}.dot-low{background:#fb8c00;}.dot-empty{background:#e53935;}
.item-input{font-size:20px;font-weight:700;width:72px;text-align:center;border:2px solid #e0e0e0;border-radius:10px;padding:7px 4px;color:#1a1a1a;}
.notes-toggle{background:none;border:none;color:#aaa;font-size:11px;cursor:pointer;padding:0 12px 8px;display:block;text-align:left;}
.item-notes-row{padding:0 12px 10px;}
.item-notes{width:100%;font-size:13px;border:1.5px solid #e0e0e0;border-radius:8px;padding:7px 10px;color:#333;resize:none;font-family:inherit;background:#fafafa;}
.item-notes:focus{outline:none;border-color:#8e3014;background:white;}

/* MANAGER */
#mgr-screen{display:none;min-height:100vh;background:#f2f2f7;}
.mgr-bar{position:sticky;top:0;z-index:200;background:#2e7d32;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.mgr-bar-left{display:flex;align-items:center;gap:10px;}
.mgr-bar h2{font-size:17px;font-weight:700;}
.mgr-bar .sub{font-size:11px;opacity:.8;margin-top:1px;}
.mgr-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.mgr-btn{background:rgba(255,255,255,.2);border:none;color:white;font-size:11px;font-weight:600;cursor:pointer;padding:6px 9px;border-radius:8px;white-space:nowrap;}
.mgr-btn.saw-day{background:#8e3014;}
.mgr-btn.saw-wk {background:#6d2410;}
.mgr-btn.cc-day {background:#1565c0;}
.mgr-btn.cc-wk  {background:#0d47a1;}
.mgr-btn.exit   {background:rgba(255,255,255,.15);}
.dl-section{background:#f2f2f7;padding:8px 12px;border-bottom:1px solid #ddd;}
.dl-section-label{font-size:10px;font-weight:700;color:#888;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;}
.dl-row{display:flex;gap:8px;}
.dl-btn{flex:1;padding:10px 6px;font-size:12px;font-weight:700;border:none;border-radius:10px;cursor:pointer;color:white;text-align:center;}
.dl-btn.saw{background:#8e3014;}
.dl-btn.saw-w{background:#6d2410;}
.dl-btn.cc {background:#1565c0;}
.dl-btn.cc-w{background:#0d47a1;}
.week-selector{display:flex;gap:6px;padding:10px 8px;overflow-x:auto;background:white;border-bottom:1px solid #e0e0e0;}
.day-tab{padding:7px 12px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:#f0f0f0;color:#555;white-space:nowrap;flex-shrink:0;}
.day-tab.active{background:#2e7d32;color:white;}
.store-tabs{display:flex;border-bottom:2px solid #e0e0e0;background:white;}
.store-tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:#888;border-bottom:3px solid transparent;}
.store-tab.active{color:#2e7d32;border-bottom-color:#2e7d32;}
.mgr-divider{height:4px;background:#e0e0e0;margin:3px 0;}
.mgr-row{display:flex;align-items:center;padding:10px 14px;background:white;border-bottom:1px solid #f0f0f0;gap:10px;}
.mgr-row:nth-child(even){background:#fafafa;}
.mgr-item-name{flex:1;font-size:13px;font-weight:600;color:#222;}
.mgr-count{font-size:18px;font-weight:800;color:#1a1a1a;min-width:36px;text-align:right;}
.mgr-note{font-size:11px;color:#888;font-style:italic;margin-top:2px;}
.compare-header{display:grid;grid-template-columns:1fr 72px 72px;gap:6px;padding:8px 14px;background:#e8f5e9;border-bottom:1px solid #c8e6c9;}
.compare-header span{font-size:11px;font-weight:700;color:#2e7d32;}
.compare-row{display:grid;grid-template-columns:1fr 72px 72px;gap:6px;padding:9px 14px;background:white;border-bottom:1px solid #f0f0f0;align-items:center;}
.compare-row:nth-child(even){background:#fafafa;}
.compare-divider{height:4px;background:#e0e0e0;margin:3px 0;}
.week-loading{text-align:center;padding:30px;color:#888;font-size:14px;}

/* SETTINGS */
#settings-screen{display:none;min-height:100vh;background:#f2f2f7;}
.settings-bar{background:#555;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.settings-bar h2{font-size:17px;font-weight:700;}
#save-settings-btn{background:#43a047;border:none;color:white;font-size:14px;font-weight:700;padding:8px 14px;border-radius:10px;cursor:pointer;}
.settings-item{background:white;border-radius:12px;margin:4px 8px;padding:12px 14px;}
.settings-item-name{font-size:13px;font-weight:700;color:#222;margin-bottom:8px;}
.settings-row{display:flex;gap:10px;align-items:center;margin-top:6px;}
.settings-label{font-size:11px;color:#888;width:80px;flex-shrink:0;}
.settings-input{flex:1;border:1.5px solid #e0e0e0;border-radius:8px;padding:6px 10px;font-size:13px;color:#222;}
.settings-input:focus{outline:none;border-color:#8e3014;}
.save-msg{text-align:center;padding:12px;color:#43a047;font-weight:700;font-size:14px;display:none;}
</style>
</head>

let storeName='', counts={}, notes={}, pars={}, saveTimer=null, notesTimer=null;

function isWeekend(d){const day=(d||new Date()).getDay();return day===0||day===5||day===6;}
function isPM845(){const n=new Date();return n.getHours()===20&&n.getMinutes()>=45;}
function fmtDate(d){return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fmtDateFull(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',year:'numeric'});}
function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function getWeekDays(){
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d);}
  return days;
}
function getPrevWeekRange(){
  const today=new Date(), dow=today.getDay();
  const end=new Date(today); end.setDate(today.getDate()-(dow===0?7:dow));
  const start=new Date(end); start.setDate(end.getDate()-6);
  return {start,end};
}
function getPrevWeekDays(){
  const {start}=getPrevWeekRange(), days=[];
  for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);days.push(d);}
  return days;
}

document.getElementById('login-date').textContent=fmtDateFull(new Date());

/* PIN */
function requirePin(target){
  pinTarget=target; pinEntry='';
  document.getElementById('pin-error').textContent='';
  document.getElementById('pin-title').textContent=target==='manager'?'🔒 Manager PIN':'🔒 Settings PIN';
  updatePinDots();
  document.getElementById('pin-overlay').classList.add('active');
}
function pinKey(k){if(pinEntry.length>=4)return;pinEntry+=k;updatePinDots();if(pinEntry.length===4)setTimeout(checkPin,150);}
function pinDel(){pinEntry=pinEntry.slice(0,-1);updatePinDots();}
function updatePinDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot'+(i<pinEntry.length?' filled':'');}
function checkPin(){
  if(pinEntry===PIN){
    document.getElementById('pin-overlay').classList.remove('active');
    if(pinTarget==='manager')openManager();else openSettings();
  }else{
    document.getElementById('pin-error').textContent='Incorrect PIN. Try again.';
    pinEntry='';updatePinDots();
  }
}
function pinCancel(){document.getElementById('pin-overlay').classList.remove('active');pinEntry='';pinTarget='';}

/* STORE */
function loadPars(){const s=localStorage.getItem('pars');pars=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_PARS));}
function openStore(name){
  storeName=name;loadPars();counts={};notes={};
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('store-label').textContent=name;
  document.getElementById('top-date').textContent=fmtDate(new Date());
  document.getElementById('weekend-banner').style.display=isWeekend()?'block':'none';
  document.getElementById('pm-reminder').style.display=isPM845()?'block':'none';
  setInterval(()=>{document.getElementById('pm-reminder').style.display=isPM845()?'block':'none';},60000);
  loadData();
}
function goBack(){
  ['app-screen','mgr-screen','settings-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('login-screen').style.display='flex';
  counts={};notes={};mgrData={};
}
function fbBase(store,key){return FB_URL+'/inventory/'+(store||storeName).replace(' ','_')+'/'+(key||dateKey(new Date()));}
async function loadData(){
  try{
    const r=await fetch(fbBase()+'.json');
    const d=await r.json();
    if(d){counts=d.counts||{};notes=d.notes||{};}
    renderItems();setLive('● Live');
  }catch(e){setLive('○ Offline');renderItems();}
}
function setLive(t){document.getElementById('live-dot').textContent=t;}
function scheduleSave(){setLive('◌ Saving...');clearTimeout(saveTimer);saveTimer=setTimeout(pushData,1200);}
async function pushData(){
  try{
    await fetch(fbBase()+'.json',{method:'PUT',body:JSON.stringify({counts,notes}),headers:{'Content-Type':'application/json'}});
    setLive('● Live');
  }catch(e){setLive('○ Offline');}
}
function getCount(n){return counts[n]??0;}
function getNote(n){return notes[n]??'';}
function change(n,delta){
  let v=getCount(n)+delta;if(v<0)v=0;
  counts[n]=v;
  const el=document.getElementById('val-'+CSS.escape(n));if(el)el.textContent=v;
  updateDot(n,v);scheduleSave();
}
function setTextCount(n,v){counts[n]=v;scheduleSave();}
function updateDot(n,v){
  const d=document.getElementById('dot-'+CSS.escape(n));if(!d)return;
  d.className='status-dot '+(v===0?'dot-empty':v===1?'dot-low':'dot-ok');
}
function saveNote(n,v){notes[n]=v;clearTimeout(notesTimer);notesTimer=setTimeout(pushData,1500);}
function toggleNotes(n){
  const row=document.getElementById('notes-row-'+CSS.escape(n));
  const btn=document.getElementById('notes-btn-'+CSS.escape(n));
  const open=row.style.display==='none';
  row.style.display=open?'block':'none';
  if(open){btn.textContent='▲ Hide note';document.getElementById('note-'+CSS.escape(n)).focus();}
  else btn.textContent='📝 '+(getNote(n)||'Add note').substring(0,40);
}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

function renderItems(){
  const list=document.getElementById('items-list');list.innerHTML='';
  const we=isWeekend();
  for(const item of ITEM_DEFS){
    if(item[0]==='divider'){const div=document.createElement('div');div.className='item-divider';list.appendChild(div);continue;}
    const [name,photoKey,flags,isText]=item;
    const v=getCount(name),note=getNote(name);
    const p=pars[name]||DEFAULT_PARS[name]||{wd:'—',we:'—'};
    const card=document.createElement('div');card.className='item-card';
    let imgEl;
    if(photoKey&&PHOTOS[photoKey]){imgEl=document.createElement('img');imgEl.className='item-img';imgEl.src=PHOTOS[photoKey];imgEl.alt=name;}
    else{imgEl=document.createElement('div');imgEl.className='item-placeholder';}
    let parHtml=p.wd!==p.we
      ?(we?`<span style="color:#e65100;font-weight:700;">Wknd: ${p.we}</span> <span style="opacity:.6;">(M–Th: ${p.wd})</span>`
          :`<span>${p.wd}</span> <span style="opacity:.6;">(F–Su: ${p.we})</span>`)
      :p.wd;
    let flagsHtml='';
    if(flags&&flags.includes('half'))  flagsHtml+='<span class="flag flag-half">½ ok</span>';
    if(flags&&flags.includes('check')) flagsHtml+='<span class="flag flag-check">✱✱✱ 8:45 PM</span>';
    let ctrlHtml;
    if(isText){
      ctrlHtml=`<input type="number" class="item-input" id="val-${CSS.escape(name)}" value="${v||''}" placeholder="0" oninput="setTextCount('${esc(name)}',this.value)">`;
    }else{
      const dc=v===0?'dot-empty':v===1?'dot-low':'dot-ok';
      ctrlHtml=`<div class="counter"><button class="btn-minus" onclick="change('${esc(name)}',-1)">−</button><span class="val" id="val-${CSS.escape(name)}">${v}</span><button class="btn-plus" onclick="change('${esc(name)}',1)">+</button><span class="status-dot ${dc}" id="dot-${CSS.escape(name)}"></span></div>`;
    }
    const hasNote=note&&note.trim();
    const inner=document.createElement('div');
    inner.innerHTML=`<div class="item-main"><div class="img-slot"></div><div class="item-info"><div class="item-name">${name}</div><div class="item-par">Par: ${parHtml}</div>${flagsHtml?`<div class="flags">${flagsHtml}</div>`:''}</div>${ctrlHtml}</div><button class="notes-toggle" id="notes-btn-${CSS.escape(name)}" onclick="toggleNotes('${esc(name)}')">${hasNote?'📝 '+note.substring(0,35)+(note.length>35?'…':''):'📝 Add note'}</button><div class="item-notes-row" id="notes-row-${CSS.escape(name)}" style="display:${hasNote?'block':'none'}"><textarea class="item-notes" rows="2" placeholder="Add a note..." id="note-${CSS.escape(name)}" oninput="saveNote('${esc(name)}',this.value)">${note}</textarea></div>`;
    card.appendChild(inner);
    card.querySelector('.img-slot').replaceWith(imgEl);
    list.appendChild(card);
  }
}

/* MANAGER */
async function openManager(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('mgr-screen').style.display='block';
  document.getElementById('mgr-date-label').textContent=fmtDate(new Date());
  buildWeekSelector();
  const days=getWeekDays();
  mgrDay=dateKey(days[days.length-1]);
  document.querySelectorAll('.day-tab').forEach(t=>t.classList.toggle('active',t.dataset.key===mgrDay));
  await loadMgrData();
}
function buildWeekSelector(){
  const sel=document.getElementById('week-selector');sel.innerHTML='';
  getWeekDays().forEach(d=>{
    const key=dateKey(d);
    const btn=document.createElement('button');
    btn.className='day-tab';btn.dataset.key=key;btn.textContent=fmtDate(d);
    btn.onclick=async()=>{mgrDay=key;document.querySelectorAll('.day-tab').forEach(t=>t.classList.toggle('active',t.dataset.key===key));await loadMgrData();};
    sel.appendChild(btn);
  });
}
async function loadMgrData(){
  mgrData={};
  await Promise.all(['Sawtelle','Culver City'].map(async store=>{
    try{const r=await fetch(fbBase(store,mgrDay)+'.json');const d=await r.json();mgrData[store]=d||{counts:{},notes:{}};}
    catch(e){mgrData[store]={counts:{},notes:{}};}
  }));
  renderMgr();
}
function switchMgrTab(store){
  mgrStore=store;
  document.getElementById('tab-saw').classList.toggle('active',store==='Sawtelle');
  document.getElementById('tab-cc').classList.toggle('active',store==='Culver City');
  document.getElementById('tab-both').classList.toggle('active',store==='Both');
  renderMgr();
}
function renderMgr(){
  const el=document.getElementById('mgr-content');el.innerHTML='';
  if(mgrStore==='Both'){renderMgrBoth(el);return;}
  const data=mgrData[mgrStore]||{counts:{},notes:{}};
  const c=data.counts||{},n=data.notes||{};
  for(const item of ITEM_DEFS){
    if(item[0]==='divider'){const d=document.createElement('div');d.className='mgr-divider';el.appendChild(d);continue;}
    const [name]=item;const v=c[name]??'—';const note=n[name]||'';
    const row=document.createElement('div');row.className='mgr-row';
    row.innerHTML=`<div class="mgr-item-name">${name}${note?`<div class="mgr-note">📝 ${note}</div>`:''}</div><div class="mgr-count">${v}</div>`;
    el.appendChild(row);
  }
}
function renderMgrBoth(el){
  const saw=(mgrData['Sawtelle']||{}).counts||{};
  const cc=(mgrData['Culver City']||{}).counts||{};
  const hdr=document.createElement('div');hdr.className='compare-header';
  hdr.innerHTML='<span>Item</span><span style="text-align:right">Sawtelle</span><span style="text-align:right">Culver City</span>';
  el.appendChild(hdr);
  for(const item of ITEM_DEFS){
    if(item[0]==='divider'){
      const d=document.createElement('div');d.className='compare-divider';el.appendChild(d);
      const h=document.createElement('div');h.className='compare-header';
      h.innerHTML='<span></span><span style="text-align:right">Sawtelle</span><span style="text-align:right">Culver City</span>';
      el.appendChild(h);continue;
    }
    const [name]=item;
    const row=document.createElement('div');row.className='compare-row';
    row.innerHTML=`<span style="font-size:13px;font-weight:600;color:#222;">${name}</span><span style="font-size:15px;font-weight:800;text-align:right;">${saw[name]??'—'}</span><span style="font-size:15px;font-weight:800;text-align:right;">${cc[name]??'—'}</span>`;
    el.appendChild(row);
  }
}

/* CSV — single store */
function buildStoreCSV(store, days, storeData){
  const headers=['Item',...days.map(d=>fmtDate(d))];
  const rows=[headers];
  for(const item of ITEM_DEFS){
    if(item[0]==='divider')continue;
    const [name]=item;
    const row=[name];
    days.forEach(d=>{
      const key=dateKey(d);
      const v=(storeData[key]&&storeData[key].counts)?storeData[key].counts[name]??'':'';
      row.push(v);
    });
    rows.push(row);
  }
  return rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
}

function triggerDownload(csv,filename){
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

async function downloadCSV(store, isWeek){
  const storeKey=store.replace(' ','_');
  let days, filenameLabel;
  if(isWeek){
    days=getPrevWeekDays();
    const {start,end}=getPrevWeekRange();
    filenameLabel='week_'+dateKey(start)+'_to_'+dateKey(end);
    document.getElementById('mgr-content').innerHTML='<div class="week-loading">⏳ Loading '+store+' week data...</div>';
  }else{
    days=[new Date(mgrDay+'T12:00:00')];
    filenameLabel='day_'+mgrDay;
  }

  const storeData={};
  await Promise.all(days.map(async d=>{
    const key=dateKey(d);
    if(!isWeek && mgrData[store]){
      storeData[key]=mgrData[store];
    }else{
      try{
        const r=await fetch(fbBase(store,key)+'.json');
        const data=await r.json();
        storeData[key]=data||{counts:{},notes:{}};
      }catch(e){storeData[key]={counts:{},notes:{}};}
    }
  }));

  const csv=buildStoreCSV(store,days,storeData);
  const storeName=store==='Culver City'?'CulverCity':'Sawtelle';
  triggerDownload(csv,'NLC_'+storeName+'_'+filenameLabel+'.csv');
  if(isWeek)renderMgr();
}

/* SETTINGS */
function openSettings(){
  loadPars();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('settings-screen').style.display='block';
  renderSettings();
}
function renderSettings(){
  const list=document.getElementById('settings-list');list.innerHTML='';
  for(const item of ITEM_DEFS){
    if(item[0]==='divider')continue;
    const [name]=item;
    const p=pars[name]||DEFAULT_PARS[name]||{wd:'',we:''};
    const div=document.createElement('div');div.className='settings-item';
    div.innerHTML=`<div class="settings-item-name">${name}</div>
      <div class="settings-row"><span class="settings-label">Mon–Thu:</span><input class="settings-input" id="swd-${CSS.escape(name)}" value="${p.wd||''}"></div>
      <div class="settings-row"><span class="settings-label">Fri–Sun:</span><input class="settings-input" id="swe-${CSS.escape(name)}" value="${p.we||''}"></div>`;
    list.appendChild(div);
  }
}
function saveSettings(){
  for(const item of ITEM_DEFS){
    if(item[0]==='divider')continue;
    const [name]=item;
    if(!pars[name])pars[name]={wd:'',we:''};
    const w=document.getElementById('swd-'+CSS.escape(name));
    const e=document.getElementById('swe-'+CSS.escape(name));
    if(w)pars[name].wd=w.value;
    if(e)pars[name].we=e.value;
  }
  localStorage.setItem('pars',JSON.stringify(pars));
  const msg=document.getElementById('save-msg');msg.style.display='block';
  setTimeout(()=>{msg.style.display='none';goBack();},1200);
}
function resetPars(){
  if(confirm('Reset all quantities to defaults?')){localStorage.removeItem('pars');loadPars();renderSettings();}
}
